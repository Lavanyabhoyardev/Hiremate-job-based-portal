# Render Blueprint for the HireMate backend (Express API).
# On Render: New → Blueprint → connect this GitHub repo. Render reads this file,
# then you fill the secret values (marked sync: false) in the dashboard.
#
# Only the HireMate backend lives here. The three frontends
# (landing, jobclaw, hiremate) are deployed on Vercel, not Render.

services:
  - type: web
    name: hiremate-backend
    runtime: node
    region: singapore           # closest to India; change if you prefer another
    plan: free                  # free tier sleeps after ~15 min idle
    rootDir: hiremate/backend
    # --no-workspaces makes npm ignore the monorepo root workspaces config and
    # install dependencies directly into hiremate/backend/node_modules, so the
    # server can resolve dotenv/express/etc. at runtime.
    buildCommand: npm install --no-workspaces
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true            # redeploys on every push to the connected branch
    envVars:
      # --- Non-secret config (safe to keep in the file) ---
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRE
        value: 7d
      - key: RAPIDAPI_JSEARCH_HOST
        value: jsearch.p.rapidapi.com
      - key: MAX_FILE_SIZE
        value: "5242880"
      - key: ALLOWED_FILE_TYPES
        value: application/pdf
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"

      # --- Secrets (set the real values in the Render dashboard) ---
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: RAPID_API_KEY
        sync: false
      - key: RAPIDAPI_JSEARCH_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

      # --- Set AFTER deploying the frontends (comma-separated, no trailing slash) ---
      # e.g. https://hiremate-xxx.vercel.app,https://landing-xxx.vercel.app
      - key: CLIENT_URL
        sync: false

      # --- Optional: email notifications ---
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
